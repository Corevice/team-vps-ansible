---
# Per-user disk quota for the VPS owner
# 300 GB soft / 350 GB hard on / (root filesystem)
# Note: requires usrquota mount option, ext4 supports it.

- name: quota tools + kernel modules install
  apt:
    name:
      - quota
      - quotatool
      - "linux-modules-extra-{{ ansible_kernel }}"
    state: present
    update_cache: yes

- name: Load quota_v2 kernel module
  community.general.modprobe:
    name: quota_v2
    state: present
    persistent: present

- name: Detect root filesystem device
  shell: findmnt -no SOURCE / | head -1
  register: root_dev
  changed_when: false

- name: Detect root fs type
  shell: findmnt -no FSTYPE / | head -1
  register: root_fstype
  changed_when: false

- name: Verify ext4 (this role only supports ext4)
  fail:
    msg: "Root fs is {{ root_fstype.stdout }}, this role only supports ext4"
  when: root_fstype.stdout != "ext4"

- name: Add usrquota to / mount in /etc/fstab (match by mount point '/')
  ansible.builtin.replace:
    path: /etc/fstab
    # 任意の source、空白、'/'、空白、'ext4'、空白、option 列、残り
    regexp: '^([^\s#]+\s+/\s+ext4\s+)([^\s]+)(\s+.*)$'
    replace: '\1\2,usrquota\3'
  register: fstab_update
  when: not (lookup('file', '/etc/fstab') is search('usrquota'))

- name: Remount / with usrquota
  command: mount -o remount /
  when: fstab_update.changed | default(false)

- name: Verify usrquota active on /
  command: findmnt -no OPTIONS /
  register: mount_opts
  changed_when: false

- name: Fail if usrquota not active
  fail:
    msg: "usrquota is not active on /. Mount options: {{ mount_opts.stdout }}"
  when: "'usrquota' not in mount_opts.stdout"

- name: Check if quota DB already exists
  stat:
    path: /aquota.user
  register: aquota_user

- name: quotacheck (initialize quota DB)
  command: quotacheck -ucm /
  when: not aquota_user.stat.exists

- name: quotaon (enable quota enforcement)
  command: quotaon /
  register: quotaon_result
  failed_when:
    - quotaon_result.rc != 0
    - "'quota already on' not in quotaon_result.stderr"
    - "'is on' not in quotaon_result.stderr"
  changed_when:
    - quotaon_result.rc == 0
    - "'quota already on' not in quotaon_result.stderr"

- name: "Set quota for owner ({{ owner }}): soft={{ (quota_soft_kb / 1024 / 1024) | int }} GB, hard={{ (quota_hard_kb / 1024 / 1024) | int }} GB"
  command: >-
    setquota -u {{ owner }}
    {{ quota_soft_kb }} {{ quota_hard_kb }}
    {{ quota_inode_soft }} {{ quota_inode_hard }}
    /

- name: Verify quota set
  command: quota -u {{ owner }}
  register: quota_verify
  changed_when: false

- name: "Owner {{ owner }} quota status"
  debug:
    var: quota_verify.stdout_lines
