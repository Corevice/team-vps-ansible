---
# F12 / D12: 127.0.0.1 bind、Phase 2 で CF Tunnel 経由 scrape
- name: node_exporter user
  user:
    name: node_exporter
    system: yes
    shell: /usr/sbin/nologin
    create_home: no

- name: textfile collector dir
  file:
    path: /var/lib/node_exporter/textfile_collector
    state: directory
    owner: node_exporter
    group: node_exporter
    mode: "0755"

- name: download node_exporter
  ansible.builtin.unarchive:
    src: "https://github.com/prometheus/node_exporter/releases/download/v1.8.2/node_exporter-1.8.2.linux-{{ ansible_architecture | replace('x86_64', 'amd64') | replace('aarch64', 'arm64') }}.tar.gz"
    dest: /usr/local/bin
    remote_src: yes
    extra_opts: [--strip-components=1]
    creates: /usr/local/bin/node_exporter

- name: node_exporter systemd unit
  copy:
    dest: /etc/systemd/system/node_exporter.service
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=Prometheus node_exporter
      After=network.target

      [Service]
      User=node_exporter
      Group=node_exporter
      ExecStart=/usr/local/bin/node_exporter \
        --web.listen-address=127.0.0.1:9100 \
        --collector.textfile.directory=/var/lib/node_exporter/textfile_collector
      Restart=on-failure

      [Install]
      WantedBy=multi-user.target

- name: enable + start node_exporter
  systemd:
    name: node_exporter
    enabled: true
    state: started
    daemon_reload: yes
