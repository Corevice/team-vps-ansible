worker_processes 1;
pid /workspace/qwen-restore/nginx-qwen.pid;
error_log /workspace/logs/nginx-qwen-error.log warn;
events { worker_connections 2048; }
http {
  map_hash_bucket_size 256;
  map $http_authorization $qwen_owner {
    default "shared-fallback";
    ""      "unknown";
    "Bearer sk-codens-vps-gabri-REPLACE" "gabri";
  }
  log_format qwen_owner_fmt '$time_iso8601 owner=$qwen_owner method=$request_method uri=$uri status=$status bytes=$body_bytes_sent rt=$request_time';
  client_max_body_size 1024M;
  server {
    listen 4000;
    server_name _;
    access_log /workspace/logs/nginx-qwen-access.log qwen_owner_fmt;
    location / {
      proxy_pass http://127.0.0.1:8000;
      proxy_set_header Host $host;
      proxy_read_timeout 1800s;
      proxy_buffering off;
    }
  }
}
